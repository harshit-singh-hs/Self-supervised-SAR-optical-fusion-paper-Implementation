model:
  variant: small
  img_size: 128
  patch_size: 16
  sar_channels: 6
  opt_channels: 11
  embed_dim: 384
  encoder_depth: 11
  decoder_dim: 192
  decoder_depth: 4
  num_heads: 6
  mlp_ratio: 4.0
  fusion: xae
  masking: consistent
  mask_ratio: 0.75

train:
  epochs: 100
  batch_size: 16
  base_lr: 1.5e-4
  weight_decay: 0.05
  warmup_epochs: 10
  min_lr: 1.0e-6
  fp16: true
  grad_checkpoint: true
  clip_grad: 1.0
  save_every: 5
  seed: 42

data:
  root: data/s1s2_landslide
  patch_type: POST1
  img_size: 128
  num_workers: 4
  pin_memory: true

logging:
  project: fus-mae
  run_name: pretrain_small_xae_consistent
  log_every: 10
