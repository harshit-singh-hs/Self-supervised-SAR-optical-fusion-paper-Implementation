model:
  variant: small
  img_size: 128
  patch_size: 16
  sar_channels: 6
  opt_channels: 11
  embed_dim: 384
  encoder_depth: 11
  num_heads: 6
  mlp_ratio: 4.0
  fusion: xae
  pretrained_checkpoint: checkpoints/pretrain/best.pth

head:
  type: linear
  freeze_encoder: false
  num_classes: 1

train:
  epochs: 50
  batch_size: 16
  base_lr: 5.0e-5
  weight_decay: 0.01
  warmup_epochs: 5
  min_lr: 1.0e-6
  fp16: true
  grad_checkpoint: false
  clip_grad: 1.0
  save_every: 5
  seed: 42

loss:
  bce_weight: 0.5
  dice_weight: 0.5

data:
  root: data/s1s2_landslide
  patch_type: POST1
  img_size: 128
  num_workers: 4
  pin_memory: true

logging:
  project: fus-mae
  run_name: finetune_xae_unfrozen
  log_every: 5
